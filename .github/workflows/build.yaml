name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Check secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.ACCESS_TOKEN }}" ] || [ -z "${{ secrets.USER_NAME }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Stats update skipped — configure ACCESS_TOKEN and USER_NAME secrets (see SETUP.md)."
            if [ -z "${{ secrets.ACCESS_TOKEN }}" ]; then
              echo "Missing: ACCESS_TOKEN"
            fi
            if [ -z "${{ secrets.USER_NAME }}" ]; then
              echo "Missing: USER_NAME (set to: smyha)"
            fi
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Get Python 3.11
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure pip cache
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        if: steps.secrets.outputs.ready == 'true'
        run: python -m pip install -r cache/requirements.txt
      - name: Update README SVGs
        if: steps.secrets.outputs.ready == 'true'
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py
      - name: Commit
        if: steps.secrets.outputs.ready == 'true'
        run: |-
          git add dark_mode.svg light_mode.svg cache/
          git diff --staged
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git commit -m "chore: update profile stats" || echo "No changes to commit"
          git push
